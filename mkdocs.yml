site_name: PromptScript
site_url: https://getpromptscript.dev/
site_description: 'Prompt-as-Code for Enterprise AI. Standardize, audit, and deploy instructions across any AI coding assistant.'
site_author: PromptScript Team
repo_url: https://github.com/mrwogu/promptscript
repo_name: mrwogu/promptscript

# Exclude build artifacts from documentation
exclude_docs: |
  __snapshots__/

copyright: Copyright &copy; 2026 PromptScript Contributors

hooks:
  - docs_extensions/mkdocs_hooks.py

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg

  palette:
    # Light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    # Navigation
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer

    # Table of contents
    - toc.follow

    # Search
    - search.suggest
    - search.highlight
    - search.share

    # Content
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    # Header
    - header.autohide
    - announce.dismiss

  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: |
        PromptScript is an agent platform configuration language. It defines
        instructions, skills, agents, MCP servers, plugins, hooks, workflows,
        and policies once, then compiles native output for 48 AI coding agent
        targets.
      sections:
        Getting Started:
          - getting-started.md
          - tutorial.md
        Agent Platform:
          - features/index.md: Agent platform concepts and complete feature model
          - features/agents.md: Native agents, tools, skills, and MCP access
          - features/skills.md: Portable skills, resources, scripts, and contracts
          - features/integrations.md: MCP servers and plugin bundles
          - features/automation.md: Lifecycle hooks, workflows, and build automation
          - features/target-platforms.md: All 48 target platforms and output families
        Reference:
          - reference/language.md: Complete PromptScript language specification
          - reference/cli.md: CLI commands and options
          - reference/cli/hooks.md: AI tool hook installation and removal
          - reference/cli/hook.md: Low-level hook runtime contract
          - reference/config.md: Configuration file format
        Target Platforms:
          - reference/formatters/index.md: All 48 supported AI agent targets
          - reference/formatters/claude.md: Claude Code output format, skills, agents, local files
          - reference/formatters/github.md: GitHub Copilot output format, instructions, prompts, skills
          - reference/formatters/cursor.md: Cursor output format, MDC frontmatter, commands
          - reference/formatters/antigravity.md: Antigravity output format, workflows, activation types
          - reference/formatters/factory.md: Factory AI output format, droids, skills
          - reference/formatters/gemini.md: Gemini CLI output format, commands, skills
          - reference/formatters/opencode.md: OpenCode output format, commands, skills, agents
        Composition and Governance:
          - guides/inheritance.md: PromptScript inheritance system
          - guides/multi-file.md: Multi-file organization
          - guides/registry.md: Building a PromptScript registry
          - guides/policy-engine.md: Organization policy enforcement
          - guides/security.md: Security controls and best practices
          - guides/ci.md: CI/CD integration
          - guides/enterprise.md: Enterprise setup
        Migration and Operations:
          - guides/migration.md: Migration guide
          - guides/hooks.md: Automatic source compilation hooks
          - guides/import.md: Import existing agent instructions
          - guides/formatter-architecture.md: Internal architecture of formatters
        Examples:
          - examples/minimal.md: Minimal project setup
          - examples/team-setup.md: Team configuration
          - examples/enterprise.md: Enterprise example
          - examples/skills-and-local.md: Skills and local overrides
          - examples/agents.md: Agent configuration
        Optional:
          - guides/faq.md: Frequently asked questions
          - guides/vs-manual.md: Comparison with manual configuration
          - testing/parity-testing.md: Formatter parity testing
          - testing/feature-coverage.md: Feature coverage matrix

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: mrwogu
      repo: promptscript
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: promptscript
          class: highlight
          format: !!python/name:docs_extensions.mkdocs_hooks.format_promptscript
        - name: prs
          class: highlight
          format: !!python/name:docs_extensions.mkdocs_hooks.format_promptscript
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  version:
    provider: mike
    default: latest
    alias: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mrwogu/promptscript
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/org/promptscript

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/init-demo.js

