      - Skill Overlays: guides/skill-overlays.md
      - Local Skills: guides/local-skills.md
      - Skill Contracts: guides/skill-contracts.md
      - Shared Resources: guides/shared-resources.md
      - Inheritance: guides/inheritance.md
