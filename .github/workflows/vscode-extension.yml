name: VS Code Extension

on:
  push:
    branches: [main]
    paths: ['apps/vscode/**', 'packages/parser/src/lexer/**']
    tags: ['v*']
  pull_request:
    paths: ['apps/vscode/**', 'packages/parser/src/lexer/**']
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm grammar:check

      - run: pnpm nx package vscode

      - uses: actions/upload-artifact@v7
        with:
          name: promptscript-vsix
          path: apps/vscode/*.vsix

  publish:
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: promptscript-vsix
          path: apps/vscode/

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Publish to VS Code Marketplace
        run: |
          VSIX_FILE=$(ls apps/vscode/*.vsix | head -1)
          npx vsce publish --packagePath "$VSIX_FILE"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
