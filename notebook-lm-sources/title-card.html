<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1280px;
        height: 720px;
        background: #0b1220;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
        position: relative;
      }
      /* Subtle gradient glow behind center */
      body::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 800px;
        height: 400px;
        background: radial-gradient(
          ellipse,
          rgba(109, 40, 217, 0.12) 0%,
          rgba(37, 99, 235, 0.06) 50%,
          transparent 70%
        );
        pointer-events: none;
      }
      .logo {
        width: 160px;
        height: 160px;
        margin-bottom: 32px;
      }
      .title {
        font-size: 72px;
        font-weight: 800;
        background: linear-gradient(135deg, #6d28d9 0%, #2563eb 55%, #06b6d4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -1px;
        margin-bottom: 16px;
      }
      .tagline {
        font-size: 26px;
        color: #e8f0ff;
        opacity: 0.85;
        font-weight: 300;
        margin-bottom: 20px;
        letter-spacing: 0.5px;
      }
      .url {
        font-size: 22px;
        color: #2563eb;
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <svg class="logo" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ps_grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6D28D9" />
          <stop offset="55%" stop-color="#2563EB" />
          <stop offset="100%" stop-color="#06B6D4" />
        </linearGradient>
      </defs>
      <rect x="8" y="8" width="240" height="240" rx="48" fill="#0B1220" />
      <rect x="8" y="8" width="240" height="240" rx="48" stroke="url(#ps_grad)" stroke-width="4" />
      <path
        d="M64 80c0-14 11-24 24-24h80c13 0 24 10 24 24v56c0 14-11 24-24 24h-44l-28 24v-24H88c-13 0-24-10-24-24V80z"
        fill="#0F1B33"
        stroke="url(#ps_grad)"
        stroke-width="4"
        stroke-linejoin="round"
      />
      <path
        d="M104 92l-14 16 14 16"
        stroke="#E8F0FF"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <path
        d="M152 92l14 16-14 16"
        stroke="#E8F0FF"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <path d="M128 90l-10 36" stroke="#E8F0FF" stroke-width="6" stroke-linecap="round" />
      <path d="M188 56l8 14 14 8-14 8-8 14-8-14-14-8 14-8 8-14z" fill="url(#ps_grad)" />
      <path d="M88 188h80" stroke="url(#ps_grad)" stroke-width="8" stroke-linecap="round" />
      <path d="M176 176v24" stroke="url(#ps_grad)" stroke-width="8" stroke-linecap="round" />
    </svg>
    <div class="title">PromptScript</div>
    <div class="tagline">One source. Every AI agent.</div>
    <div class="url">getpromptscript.dev</div>
  </body>
</html>
